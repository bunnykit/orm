name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Determine next version
        id: version
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { readFileSync } = require("fs");
          const { execSync } = require("child_process");

          const current = JSON.parse(readFileSync("package.json", "utf8")).version;
          let latest = current;

          try {
            const output = execSync("npm view @bunnykit/orm version --json", { encoding: "utf8", stdio: ["ignore", "pipe", "ignore"] }).trim();
            if (output) {
              latest = JSON.parse(output);
            }
          } catch {
            latest = current;
          }

          const source = latest || current;
          const parts = String(source).split(".").map((part) => Number(part));
          const major = Number.isFinite(parts[0]) ? parts[0] : 0;
          const minor = Number.isFinite(parts[1]) ? parts[1] : 0;
          const patch = Number.isFinite(parts[2]) ? parts[2] : 0;
          const next = `${major}.${minor}.${patch + 1}`;

          console.log(`current=${current}`);
          console.log(`next=${next}`);
          NODE

      - name: Update package version
        run: npm version "${{ steps.version.outputs.next }}" --no-git-tag-version

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > ~/.npmrc
          bun publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.next }} [skip ci]"
          git push origin HEAD:main
